<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="Fraunces, Georgia, serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&amp;display=swap');
      .name { font-family: 'Fraunces', Georgia, serif; font-weight: 600; letter-spacing: 0.04em; }
    </style>
  </defs>

  <!-- Transparent background; use over either dark or light surface -->

  <!-- Author name, brand cream on transparent (will read on dark surface) -->
  <text x="400" y="155" text-anchor="middle" class="name" font-size="120" fill="#F5EFE6">Alex Savage</text>

  <!-- Gold underline rule, 60% width of the name -->
  <line x1="200" y1="195" x2="600" y2="195" stroke="#E8B756" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small kicker text below for some lockup uses -->
  <text x="400" y="232" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" letter-spacing="0.28em" fill="#B1A2CC">ACTION HAREMLIT</text>
</svg>
