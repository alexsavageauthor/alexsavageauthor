<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&amp;display=swap');
      .sav-main { font-family: 'Cinzel', 'Trajan Pro', Georgia, serif; font-weight: 700; letter-spacing: 0.16em; }
      .sav-sub  { font-family: 'Cinzel', 'Trajan Pro', Georgia, serif; font-weight: 500; letter-spacing: 0.42em; }
    </style>
  </defs>

  <!-- ICON -->
  <g transform="translate(100,40)">
    <!-- Open book: V-peak at top, base at bottom -->
    <path d="M 60 360 L 200 175 L 200 360 Z" fill="#101010"/>
    <path d="M 340 360 L 200 175 L 200 360 Z" fill="#101010"/>
    <rect x="56" y="354" width="288" height="10" fill="#101010"/>

    <!-- Page detail (subtle, radial from spine) -->
    <g stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.85">
      <line x1="100" y1="350" x2="195" y2="222"/>
      <line x1="138" y1="350" x2="197" y2="268"/>
      <line x1="172" y1="350" x2="199" y2="312"/>
      <line x1="300" y1="350" x2="205" y2="222"/>
      <line x1="262" y1="350" x2="203" y2="268"/>
      <line x1="228" y1="350" x2="201" y2="312"/>
    </g>

    <!-- Arrow shaft -->
    <rect x="195" y="100" width="10" height="288" fill="#101010"/>

    <!-- Arrowhead: barbed, pointing down -->
    <path d="M 168 388 L 200 432 L 232 388 L 200 406 Z" fill="#101010"/>

    <!-- Fletching: jagged feather, the savage edge -->
    <path d="M 200 22
             L 254 96 L 234 84 L 244 108 L 218 94 L 224 122
             L 200 105
             L 176 122 L 182 94 L 156 108 L 166 84 L 146 96 Z"
          fill="#101010"/>
  </g>

  <!-- Wordmark divider -->
  <g transform="translate(300,540)">
    <line x1="-92" y1="0" x2="-30" y2="0" stroke="#101010" stroke-width="1.4"/>
    <line x1="30"  y1="0" x2="92"  y2="0" stroke="#101010" stroke-width="1.4"/>
    <circle cx="0" cy="0" r="3" fill="#101010"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="618" text-anchor="middle" class="sav-main" font-size="74" fill="#101010">SAVAGERY</text>
  <text x="300" y="678" text-anchor="middle" class="sav-sub"  font-size="26" fill="#101010">&amp; CO.</text>
</svg>
